<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика: Модульный Тест | Physics Quiz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --secondary: #c084fc;
            --accent: #22d3ee;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --text: #f8fafc;
            --success: #4ade80;
            --error: #f87171;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(100px, 100px);
            }
        }

        #app {
            width: 95%;
            max-width: 650px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.4);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-bottom: 35px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-box {
            min-height: 120px;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.5;
            margin-bottom: 30px;
            font-weight: 500;
            color: #fff;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 16px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.05rem;
            position: relative;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            transform: translateY(-2px);
            color: #fff;
        }

        .option-item.correct {
            background: rgba(74, 222, 128, 0.15);
            border-color: var(--success);
            color: var(--success);
        }

        .option-item.wrong {
            background: rgba(248, 113, 113, 0.15);
            border-color: var(--error);
            color: var(--error);
        }

        .btn-start {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px 48px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .btn-start:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 20px 35px -10px rgba(99, 102, 241, 0.5);
        }

        #result-screen {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 10px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            position: relative;
        }

        .score-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            color: #fff;
        }

        .score-total {
            font-size: 1rem;
            color: #64748b;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .question-text {
                font-size: 1.15rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div id="app">
        <div id="start-screen" class="card fade-in">
            <div class="lang-switch">
                <button class="lang-btn active" id="btn-ru-start" onclick="setLang('ru')">RU</button>
                <button class="lang-btn" id="btn-kk-start" onclick="setLang('kk')">KK</button>
            </div>
            <h1 id="title-main">ФИЗИКА: МОДУЛЬ</h1>
            <p id="welcome-text" style="text-align: center; color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem;">
                75 вопросов: Оптика, Магнетизм, Кванты.
            </p>
            <div style="display: flex; justify-content: center;">
                <button class="btn-start" onclick="startQuiz()" id="start-btn-text">НАЧАТЬ ТЕСТ</button>
            </div>
        </div>

        <div id="quiz-screen" class="card" style="display: none;">
            <div class="lang-switch">
                <button class="lang-btn" id="btn-ru-quiz" onclick="setLang('ru')">RU</button>
                <button class="lang-btn" id="btn-kk-quiz" onclick="setLang('kk')">KK</button>
            </div>
            <div class="stats">
                <span id="q-counter">Вопрос 1 / 75</span>
                <span id="timer">00:00</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-fill"></div>
            </div>
            <div class="question-box">
                <h2 class="question-text" id="q-text"></h2>
                <div class="options-grid" id="options-box"></div>
            </div>
        </div>

        <div id="result-screen" class="card">
            <h1 id="result-title">РЕЗУЛЬТАТ</h1>
            <div class="score-circle">
                <div class="score-val" id="score-num">0</div>
                <div class="score-total" id="score-total-text">из 75</div>
            </div>
            <p id="feedback-text" style="margin-bottom: 30px; font-size: 1.2rem; color: #cbd5e1;"></p>
            <button class="btn-start" onclick="location.reload()" id="restart-btn">ЗАНОВО</button>
        </div>
    </div>

    <script>
        let currentLang = 'ru';
        let currentIndex = 0;
        let score = 0;
        let seconds = 0;
        let timer;

        const uiTexts = {
            ru: {
                title: "ФИЗИКА: МОДУЛЬ",
                welcome: "75 вопросов: Оптика, Магнетизм, Кванты.",
                start: "НАЧАТЬ ТЕСТ",
                counter: "Вопрос",

            },
            kk: {
                title: "ФИЗИКА: МОДУЛЬ",
                welcome: "75 сұрақ: Оптика, Магнетизм, Кванттар.",
                start: "ТЕСТТІ БАСТАУ",
                counter: "Сұрақ",
                result: "НӘТИЖЕ",
                total: "75-тен",
                restart: "ҚАЙТАЛАУ",
                feedback: ["Қайта көріңіз!", "Жаман емес!", "Өте жақсы!", "Сіз физика шеберісіз!"]
            }
        };

        const quizData = [
            { ru: { q: "Единица измерения вектора магнитной индукции (СИ):", a: "Тесла (Тл)", o: ["Вебер (Вб)", "Генри (Гн)", "Тесла (Тл)", "Люкс (лк)"] }, kk: { q: "СИ жүйесіндегі магнит индукциясының өлшем бірлігі:", a: "Тесла (Тл)", o: ["Вебер (Вб)", "Генри (Гн)", "Тесла (Тл)", "Люкс (лк)"] } },
            { ru: { q: "Закон полного тока для магнитного поля в вакууме:", a: "∮ B dl = μ₀ I", o: ["∮ B dl = μ₀ I", "∮ H dl = I", "dB = (μ₀ I dl sinα) / (4πr²)", "F = qvB sinα"] }, kk: { q: "Вакуумдегі магнит өрісі үшін толық ток заңы:", a: "∮ B dl = μ₀ I", o: ["∮ B dl = μ₀ I", "∮ H dl = I", "dB = (μ₀ I dl sinα) / (4πr²)", "F = qvB sinα"] } },
            { ru: { q: "Закон полного тока для магнитного поля в веществах:", a: "∮ H dl = I", o: ["∮ B dl = μ₀ I", "∮ H dl = I", "Ф = LI", "E = -L dI/dt"] }, kk: { q: "Заттардағы магнит өрісі үшін толық ток заңы:", a: "∮ H dl = I", o: ["∮ B dl = μ₀ I", "∮ H dl = I", "Ф = LI", "E = -L dI/dt"] } },
            { ru: { q: "Условие максимума света при интерференции (разность хода):", a: "Δ = ± kλ", o: ["Δ = ± kλ", "Δ = ±(2k+1)λ/2", "Δ = λ / n", "Δ = d sinφ"] }, kk: { q: "Интерференция кезіндегі жарық максимумының шарты (жол айырымы):", a: "Δ = ± kλ", o: ["Δ = ± kλ", "Δ = ±(2k+1)λ/2", "Δ = λ / n", "Δ = d sinφ"] } },
            { ru: { q: "Условие максимума при отражении света от тонких пленок:", a: "2h√(n² - sin²i) = (2m-1)λ/2", o: ["2h√(n² - sin²i) = (2m-1)λ/2", "2h√(n² - sin²i) = mλ", "r = √(mRλ)", "Δx = λL/d"] }, kk: { q: "Жұқа пленкадан шағылған жарықтың максимумының шарты:", a: "2h√(n² - sin²i) = (2m-1)λ/2", o: ["2h√(n² - sin²i) = (2m-1)λ/2", "2h√(n² - sin²i) = mλ", "r = √(mRλ)", "Δx = λL/d"] } },
            { ru: { q: "Радиус светлых колец Ньютона (в отраженном свете):", a: "rₘ = √((2m-1)Rλ / 2)", o: ["rₘ = √((2m-1)Rλ / 2)", "rₘ = √(mRλ)", "rₘ = √((2m-1)λ / 2)", "rₘ = √(2mRλ)"] }, kk: { q: "Ньютонның ақ сақиналарының радиусы (шағылған жарықта):", a: "rₘ = √((2m-1)Rλ / 2)", o: ["rₘ = √((2m-1)Rλ / 2)", "rₘ = √(mRλ)", "rₘ = √((2m-1)λ / 2)", "rₘ = √(2mRλ)"] } },
            { ru: { q: "Дифференциальное уравнение свободных электромагнитных колебаний:", a: "d²q/dt² + ω₀²q = 0", o: ["d²q/dt² + ω₀²q = 0", "d²q/dt² + 2β dq/dt + ω₀²q = 0", "X_C = 1/ωC", "L d²q/dt² = 0"] }, kk: { q: "Еркін электр тербелістерінің дифференциалдық теңдеуі:", a: "d²q/dt² + ω₀²q = 0", o: ["d²q/dt² + ω₀²q = 0", "d²q/dt² + 2β dq/dt + ω₀²q = 0", "X_C = 1/ωC", "L d²q/dt² = 0"] } },
            { ru: { q: "Дифференциальное уравнение затухающих колебаний:", a: "d²q/dt² + 2β dq/dt + ω₀²q = 0", o: ["d²q/dt² + 2β dq/dt + ω₀²q = 0", "d²q/dt² + ω₀²q = 0", "F = BIl sinα", "ε = -L dI/dt"] }, kk: { q: "Өшетін электр тербелістерінің дифференциалдық теңдеуі:", a: "d²q/dt² + 2β dq/dt + ω₀²q = 0", o: ["d²q/dt² + 2β dq/dt + ω₀²q = 0", "d²q/dt² + ω₀²q = 0", "F = BIl sinα", "ε = -L dI/dt"] } },
            { ru: { q: "Выражение для силы Лоренца:", a: "F = q v B sin α", o: ["F = q v B sin α", "F = B I l sin α", "F = m a", "F = k q₁q₂/r²"] }, kk: { q: "Лоренц күшінің формуласы:", a: "F = q v B sin α", o: ["F = q v B sin α", "F = B I l sin α", "F = m a", "F = k q₁q₂/r²"] } },

            { ru: { q: "Закон Био-Савара-Лапласа:", a: "dB = (μ₀ I dl sinα) / (4πr²)", o: ["dB = (μ₀ I dl sinα) / (4πr²)", "B = μ₀ H", "Ф = BS cosα", "L = μ₀μ n² V"] }, kk: { q: "Био-Савар-Лаплас заңы:", a: "dB = (μ₀ I dl sinα) / (4πr²)", o: ["dB = (μ₀ I dl sinα) / (4πr²)", "B = μ₀ H", "Ф = BS cosα", "L = μ₀μ n² V"] } },
            { ru: { q: "Какой волной является свет?", a: "Электромагнитная поперечная волна", o: ["Механическая продольная", "Электромагнитная поперечная волна", "Звуковая волна", "Статическая волна"] }, kk: { q: "Жарық қандай толқын?", a: "Электромагниттік көлденең толқын", o: ["Механикалық бойлық", "Электромагниттік көлденең толқын", "Дыбыс толқыны", "Статикалық толқын"] } },
            { ru: { q: "Емкостное сопротивление:", a: "X_C = 1 / (ω C)", o: ["X_C = 1 / (ω C)", "X_L = ω L", "R = ρ l / S", "Z = √(R² + X²)"] }, kk: { q: "Сыйымдылық кедергісінің формуласы:", a: "X_C = 1 / (ω C)", o: ["X_C = 1 / (ω C)", "X_L = ω L", "R = ρ l / S", "Z = √(R² + X²)"] } },

            { ru: { q: "Экстраток при замыкании цепи:", a: "I = (ε/R) * (1 - e^(-Rt/L))", o: ["I = (ε/R) * (1 - e^(-Rt/L))", "I = I₀ * e^(-Rt/L)", "I = U/R", "I = q/t"] }, kk: { q: "Тізбекті қосқандағы токтың өзгеру заңы (Экстраток):", a: "I = (ε/R) * (1 - e^(-Rt/L))", o: ["I = (ε/R) * (1 - e^(-Rt/L))", "I = I₀ * e^(-Rt/L)", "I = U/R", "I = q/t"] } },
            { ru: { q: "Экстраток при размыкании цепи:", a: "I = I₀ * e^(-Rt/L)", o: ["I = I₀ * e^(-Rt/L)", "I = (ε/R) * (1 - e^(-Rt/L))", "I = I₀ sin(ωt)", "I = U/Z"] }, kk: { q: "Тізбекті ажыратқандағы токтағы өзгеру заңы (Экстраток):", a: "I = I₀ * e^(-Rt/L)", o: ["I = I₀ * e^(-Rt/L)", "I = (ε/R) * (1 - e^(-Rt/L))", "I = I₀ sin(ωt)", "I = U/Z"] } },

            { ru: { q: "Индукция магнитного поля в вакууме при напряженности 10 кА/м:", a: "12.56 мТл", o: ["12.56 мТл", "1.25 мТл", "125 мТл", "0.12 мТл"] }, kk: { q: "H=10 кА/м болса, вакуумдегі индукция B:", a: "12.56 мТл", o: ["12.56 мТл", "1.25 мТл", "125 мТл", "0.12 мТл"] } },
            { ru: { q: "Сила света точечного источника при полном потоке 12.56 лм:", a: "1 кд", o: ["1 кд", "12.56 кд", "4π кд", "10 кд"] }, kk: { q: "Жарық ағыны 12.56 лм болса, жарық күші:", a: "1 кд", o: ["1 кд", "12.56 кд", "4π кд", "10 кд"] } },
            { ru: { q: "Магнитный момент кругового тока (I=10 А, r=10 см):", a: "0.314 А·м²", o: ["0.314 А·м²", "3.14 А·м²", "0.0314 А·м²", "1 А·м²"] }, kk: { q: "r=10 см, I=10 А болса, магнит моменті:", a: "0.314 А·м²", o: ["0.314 А·м²", "3.14 А·м²", "0.0314 А·м²", "1 А·м²"] } },
            { ru: { q: "Разность фаз при разности хода 0.3λ:", a: "0.6π", o: ["0.6π", "0.3π", "π", "1.2π"] }, kk: { q: "Жол айырмасы 0.3λ болса, фазалар айырмасы:", a: "0.6π", o: ["0.6π", "0.3π", "π", "1.2π"] } },
            { ru: { q: "Индуктивное сопротивление катушки (L=0.2 Гн, f=50 Гц):", a: "62.8 Ом", o: ["62.8 Ом", "314 Ом", "10 Ом", "50 Ом"] }, kk: { q: "L=0.2 Гн, f=50 Гц болса, индуктивтілік кедергі:", a: "62.8 Ом", o: ["62.8 Ом", "314 Ом", "10 Ом", "50 Ом"] } },
            { ru: { q: "Сила Лоренца для протона при v=10⁷ м/с в поле 2 Тл:", a: "3.2·10⁻¹² Н", o: ["3.2·10⁻¹² Н", "1.6·10⁻¹⁹ Н", "3.2·10⁻¹⁹ Н", "6.4·10⁻¹² Н"] }, kk: { q: "v=10⁷ м/с, B=2 Тл болса, Лоренц күші:", a: "3.2·10⁻¹² Н", o: ["3.2·10⁻¹² Н", "1.6·10⁻¹⁹ Н", "3.2·10⁻¹⁹ Н", "6.4·10⁻¹² Н"] } }
        ];

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id.includes(lang));
            });
            updateUI();
            if (document.getElementById('quiz-screen').style.display !== 'none') {
                showQuestion();
            }
        }

        function updateUI() {
            const t = uiTexts[currentLang];
            document.getElementById('title-main').innerText = t.title;
            document.getElementById('welcome-text').innerText = t.welcome;
            document.getElementById('start-btn-text').innerText = t.start;
            document.getElementById('result-title').innerText = t.result;
            document.getElementById('score-total-text').innerText = (document.getElementById('result-screen').style.display === 'block') ? "/ 100" : t.total;
            document.getElementById('restart-btn').innerText = t.restart;
        }

        function startQuiz() {
            // Fisher-Yates shuffle for true randomness
            for (let i = quizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }

            currentIndex = 0;
            score = 0;
            seconds = 0;

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';

            updateUI();
            startTimer();
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentIndex][currentLang];
            document.getElementById('q-counter').innerText = `${uiTexts[currentLang].counter} ${currentIndex + 1} / 75`;
            document.getElementById('q-text').innerText = data.q;

            const box = document.getElementById('options-box');
            box.innerHTML = '';

            // Shuffle options
            const options = [...data.o].sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-item fade-in';
                div.innerText = opt;
                div.onclick = () => handleSelect(div, opt, data.a);
                box.appendChild(div);
            });

            const progress = (currentIndex / 75) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        function handleSelect(el, choice, correct) {
            const all = document.querySelectorAll('.option-item');
            all.forEach(item => item.style.pointerEvents = 'none');

            if (choice === correct) {
                el.classList.add('correct');
                score++;
            } else {
                el.classList.add('wrong');
                all.forEach(item => {
                    if (item.innerText === correct) item.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentIndex++;
                if (currentIndex < 75) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1000);
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function showResults() {
            clearInterval(timer);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            const finalScore100 = Math.round((score / 75) * 100);
            document.getElementById('score-num').innerText = finalScore100;
            document.getElementById('score-total-text').innerText = "/ 100";

            let feedbackIdx = 0;
            if (finalScore100 >= 90) feedbackIdx = 3;
            else if (finalScore100 >= 70) feedbackIdx = 2;
            else if (finalScore100 >= 50) feedbackIdx = 1;

            document.getElementById('feedback-text').innerText = uiTexts[currentLang].feedback[feedbackIdx] + ` (${score} / 75)`;
        }

        updateUI();
    </script>
</body>

</html>
